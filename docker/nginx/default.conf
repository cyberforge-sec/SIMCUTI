server {
    listen 80;
    listen [::]:80;
    server_name localhost simcuti.adfa.my.id;
    root /app/public;
    index index.php index.html;

    # Security headers are managed by Laravel SecurityHeaders middleware
    # (app/Http/Middleware/SecurityHeaders.php) — NOT here.

    # HSTS is only set here because it must be set at transport level
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Override Cloudflare's injected Permissions-Policy with our own clean version
    proxy_hide_header Permissions-Policy;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;

    client_max_body_size 10M;
    client_body_timeout 60s;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
