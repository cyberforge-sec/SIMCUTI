name: simcuti
services:
  - name: web
    type: web
    env: docker
    docker:
      dockerfile: ./Dockerfile
    instance_type: nano
    scaling:
      min: 1
      max: 1
    ports:
      - name: http
        port: 8000
        protocol: http
    env_vars:
      - key: APP_NAME
        value: SIMCUTI
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: ${KOOYEB_PUBLIC_DOMAIN}
      - key: APP_TIMEZONE
        value: Asia/Jakarta
      - key: APP_KEY
        scopes:
          - build
          - runtime
      - key: SUPABASE_URL
        scopes:
          - build
          - runtime
      - key: SUPABASE_ANON_KEY
        scopes:
          - build
          - runtime
      - key: SUPABASE_SERVICE_KEY
        scopes:
          - build
          - runtime
      - key: SUPABASE_STORAGE_BUCKET
        value: leave-attachments
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        scopes:
          - build
          - runtime
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        scopes:
          - build
          - runtime
      - key: MAIL_PASSWORD
        scopes:
          - build
          - runtime
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        scopes:
          - build
          - runtime
      - key: MAIL_FROM_NAME
        value: SIMCUTI
    health_checks:
      - grace_period: 5
        interval: 30
        path: /
        port: 8000
        protocol: http
        restart_limit: 3
        timeout: 5
